<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeRank Admin</title>
    <!-- Google Font (Outfit) for Google-like UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply saved theme before React mounts to prevent flash -->
    <script>
      (function () {
        var saved = localStorage.getItem("admin-theme");
        // Only override the default if the user has explicitly saved a preference
        if (saved === "dark" || saved === "light") {
          document.documentElement.setAttribute("data-theme", saved);
        }
        // No saved preference → stays as the HTML default: light
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
